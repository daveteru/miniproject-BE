services:
  db:
    image: postgres:16
    container_name: minpro_container
    restart: always
    environment:
      - POSTGRES_PASSWORD=${DOCKER_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '2222:5432'

  cachie:
    image: redis:latest
    container_name: redis_container
    restart: always
    ports:
      - '6379:6379'

volumes:
  pgdata: